[package]
name = "surreal-sync-example-from-snowflake"
version = "0.6.0"
edition = "2021"
publish = false
description = "Embedder example: Snowflake ingestion with in-process transforms"

[[bin]]
name = "surreal-sync-example-from-snowflake"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
tokio = { version = "1.49", features = ["full"] }
surreal-sync-snowflake = { path = "../../crates/snowflake", features = ["from_snowflake"] }
surreal-sync-surreal = { path = "../../crates/surreal" }
