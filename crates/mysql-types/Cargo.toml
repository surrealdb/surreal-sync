[package]
name = "mysql-types"
version = "0.1.0"
edition = "2021"
description = "MySQL type conversions for sync-core types"
license = "MIT"

[dependencies]
sync-core = { path = "../sync-core" }
json-types = { path = "../json-types" }
binlog-protocol = { path = "../binlog-protocol" }
mysql_async = { version = "0.36", default-features = false, features = ["default-rustls"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
base64 = "0.22"
anyhow = "1.0.100"
tracing = "0.1"
rustls = { version = "0.23", default-features = false, features = ["aws_lc_rs", "std"] }

[dev-dependencies]
tokio = { version = "1.49", features = ["full"] }
rust_decimal = "1.39"
hex = "0.4"
