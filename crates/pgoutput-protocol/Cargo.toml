[package]
name = "pgoutput-protocol"
version = "0.1.0"
edition = "2021"
description = "Thin pgoutput/pg_walstream API for surreal-sync PostgreSQL WAL CDC"
rust-version = "1.87"

[dependencies]
anyhow = "1.0"
pg_walstream = { version = "0.7", default-features = false, features = ["rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.49", features = ["sync", "time"] }
tokio-util = { version = "0.7" }
tracing = "0.1"

[lib]
name = "pgoutput_protocol"
path = "src/lib.rs"
