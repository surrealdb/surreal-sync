[package]
name = "surreal-sync-snowflake-source"
version = "0.1.0"
edition = "2021"
description = "Snowflake ingestion source for surreal-sync (SQL REST API v2, key-pair JWT auth)"
authors = ["surreal-sync contributors"]

[dependencies]
# Core data model + sink trait
sync-core = { path = "../sync-core" }
surreal-sink = { path = "../surreal-sink" }
snowflake-types = { path = "../snowflake-types" }

# HTTP client (rustls to match the process-wide aws-lc-rs provider; no OpenSSL)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Snowflake key-pair JWT generation
snowflake-jwt = "0.3"

# Async runtime (timers for async statement polling)
tokio = { version = "1.49", features = ["time"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling / logging
anyhow = "1.0"
tracing = "0.1"
