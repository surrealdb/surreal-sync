[package]
name = "surreal-sync-postgresql-pgoutput-source"
version = "0.1.0"
edition = "2021"
description = "PostgreSQL pgoutput WAL CDC sync for surreal-sync"
rust-version = "1.87"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
checkpoint = { path = "../checkpoint" }
chrono = { version = "0.4", features = ["serde"] }
pg_walstream = { version = "0.7", default-features = false, features = ["rustls-tls"] }
pgoutput-protocol = { path = "../pgoutput-protocol" }
postgresql-types = { path = "../postgresql-types" }
postgres-types = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
surreal-sink = { path = "../surreal-sink" }
surreal-sync-interleaved-snapshot = { path = "../interleaved-snapshot" }
surreal-sync-postgresql = { path = "../postgresql" }
sync-core = { path = "../sync-core" }
sync-transform = { path = "../sync-transform" }
tokio = { version = "1.49", features = ["full"] }
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4", "with-serde_json-1", "with-uuid-1"] }
tokio-util = { version = "0.7" }
tracing = "0.1"
uuid = { version = "1.10", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = "3.27"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
libc = "0.2"
chrono = { version = "0.4", features = ["serde"] }
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4", "with-serde_json-1", "with-uuid-1"] }
checkpoint = { path = "../checkpoint" }
surreal2-sink = { path = "../surreal2-sink" }
surrealdb = { version = "2.6.5", features = ["protocol-ws", "kv-mem"] }
serde = { version = "1.0", features = ["derive"] }
sync-transform = { path = "../sync-transform" }

[lib]
name = "surreal_sync_postgresql_pgoutput_source"
path = "src/lib.rs"
