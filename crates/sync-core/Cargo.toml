[package]
name = "surreal-sync-core"
version = "0.6.0"
publish = true
edition = "2021"
description = "Core types, SurrealSink, transform/sink-connect traits, and checkpoint API for surreal-sync"
authors = ["surreal-sync contributors"]
repository = "https://github.com/surrealdb/surreal-sync"
homepage = "https://github.com/surrealdb/surreal-sync"
documentation = "https://docs.rs/surreal-sync-core"

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# UUID support
uuid = { version = "1.10", features = ["v4", "serde"] }

# ULID support
ulid = { version = "1.1", features = ["serde"] }

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Async traits (CheckpointStore / SyncManager)
async-trait = "0.1"

# Logging (checkpoint emit)
tracing = "0.1"

[dev-dependencies]
# Testing
tokio-test = "0.4"

[lib]
name = "surreal_sync_core"
path = "src/lib.rs"
