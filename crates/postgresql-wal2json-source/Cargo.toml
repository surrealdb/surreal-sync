[package]
name = "surreal-sync-postgresql-wal2json-source"
version = "0.1.0"
edition = "2021"
description = "PostgreSQL logical replication (WAL) sync for surreal-sync"

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1"
tokio = { version = "1.49", features = ["full"] }
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4", "with-uuid-1", "with-serde_json-1"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.0", features = ["v4"] }

# Sync dependencies
checkpoint = { path = "../checkpoint" }
surreal-sync-postgresql = { path = "../postgresql" }
surreal-sync-interleaved-snapshot = { path = "../interleaved-snapshot" }
async-trait = "0.1"
surreal-sink = { path = "../surreal-sink" }
surreal2-sink = { path = "../surreal2-sink" }
sync-core = { path = "../sync-core" }
sync-transform = { path = "../sync-transform" }
surrealdb = { version = "2.6.5", features = ["protocol-ws", "kv-mem"] }
rust_decimal = { version = "^1.23", features = ["db-tokio-postgres"] }
libc = "0.2.183"

[dev-dependencies]
tempfile = "3.27"
async-trait = "0.1"
surreal2-sink = { path = "../surreal2-sink" }
surrealdb = { version = "2.6.5", features = ["protocol-ws", "kv-mem"] }
sync-transform = { path = "../sync-transform" }
checkpoint = { path = "../checkpoint" }

[[bin]]
name = "surreal-sync-postgresql-wal2json-source-demo"
path = "src/main.rs"

[lib]
name = "surreal_sync_postgresql_wal2json_source"
path = "src/lib.rs"
