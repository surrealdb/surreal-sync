[package]
name = "sync-transform"
version = "0.1.0"
edition = "2021"
description = "Transform stages and ordered apply/watermark for surreal-sync"
authors = ["surreal-sync contributors"]

[features]
default = []
# Shared harness doubles for apply-loop tests and (later) source crates.
test-support = []

[[bin]]
name = "sync-transform-fixture-worker"
path = "src/bin/fixture_worker.rs"

[[test]]
name = "external_stdio"
path = "tests/external_stdio.rs"
required-features = ["test-support"]

[dependencies]
# Universal source/target types
sync-core = { path = "../sync-core" }
# Sink abstraction for apply / write_rows
surreal-sink = { path = "../surreal-sink" }

# Error handling
anyhow = "1.0"

# Async
async-trait = "0.1"
tokio = { version = "1.49", features = ["macros", "rt", "sync", "time", "process", "io-util"] }

# Framing / wire
bytes = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1"

# Logging (skip policy, diagnostics)
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1.49", features = ["macros", "rt-multi-thread", "sync", "time", "process", "io-util"] }
