[package]
name = "snowflake-types"
version = "0.1.0"
edition = "2021"
description = "Snowflake SQL API type conversions for sync-core types"
license = "MIT"

[dependencies]
sync-core = { path = "../sync-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"

[dev-dependencies]
serde_json = "1.0"
