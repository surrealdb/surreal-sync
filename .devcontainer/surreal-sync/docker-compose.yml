# Minimal devcontainer: just the build environment.
#
# The test suite no longer depends on long-lived database services. Each test
# binary starts its own throwaway containers (SurrealDB/Postgres/MySQL/Mongo/
# Neo4j/Kafka) on demand via the Docker daemon provided by the docker-in-docker
# devcontainer feature (see devcontainer.json). So this compose file only needs
# to define the development container itself.

services:
  surreal-sync-dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspace:cached
    command: sleep infinity
